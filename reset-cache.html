<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>EVOLVA cache reset</title><style>body{font-family:system-ui;background:#06100c;color:#e8fff3;display:grid;place-items:center;min-height:100vh;margin:0}.card{max-width:32rem;padding:2rem;border:1px solid #476b59;border-radius:18px;background:#0c1d15}button{font:inherit;padding:.8rem 1rem;border-radius:10px;border:0;font-weight:700}code{color:#9fffc5}</style></head><body><main class="card"><h1>EVOLVA update repair</h1><p id="status">Removing obsolete offline files…</p><button id="retry" hidden>Open EVOLVA</button></main><script>
(async()=>{const status=document.getElementById('status'),retry=document.getElementById('retry');try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('evolva-')).map(k=>caches.delete(k)))}status.textContent='Old EVOLVA caches removed. Opening build 9.0.4…';setTimeout(()=>location.replace('./index.html?fresh=9.0.4-'+Date.now()),500)}catch(e){status.textContent='Automatic reset could not finish. Tap below to retry.';retry.hidden=false;retry.onclick=()=>location.replace('./index.html?fresh=9.0.4-'+Date.now())}})();
</script></body></html>
